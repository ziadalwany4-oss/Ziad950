<!DOCTYPE html>
<html>
<head>
<title>Age Calculator</title>
<style>
h1{
   color:blue;
   font-weight: bold;
   text-align: center;
   font-size: 50px;
}
p{
    font-weight: bold;
    color: black;
    margin-left: 20px;
}
body{
background-color:aliceblue;
}
button{
    color: white;
    padding:15px 13px;
    background-color:blue;
    border-radius: 200px;
}
input{
    width:30%;
    border-radius: 200px;
    padding:10px 10px;
    margin-left: 20px;
}
input:focus{
    outline:noun;
    background-color:lightblue;
    border-color:#222;
}
button:hover{
    background-color:darkblue;
    color:white;
}
</style>
</head>
<body>
<h1>Age Calculator</h1>
<p>Enter your birthyear to calclate your age</p>

<input type="number" id="birthyear" placeholder="Enter your birthyear">

<button type="button" id="Enter">Enter Age</button>

<p id="result"></p>
<script>
let birthyearInput = document.getElementById("birthyear");
let button = document.getElementById("Enter");
let result = document.getElementById("result");

button.addEventListener("click", function(){
let birthyear = birthyearInput.value;
if(birthyear === ""){
result.textContent = "you are big donky";
return;
}
let age = 2026 - birthyear;
result.textContent = "you are " + age;
});
</script>                        
</body>
</html>
