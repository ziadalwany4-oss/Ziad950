<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
h1{
  color:blue;
  text-align:center;
  font-size: 50px;
}
input{  
  width: 90%;
  border-radius: 10px;
  border-color: black;
  margin-bottom: 10px;
  margin-left:20px;
  font-weight: bold;
  color:black;
  
}
 button{
  color:white;
  background-color:blue;
  border-radius: 10px;
  padding:12px 15px;
  margin-left: 20px;
 }
 button:hover{
    background-color:darkblue;
    border-color: black;
 }
 input:focus{
  background-color:lightblue;
 }
 p{
  margin-left: 20px;
  font-weight: bold;
 }
 #messag{
  color:blue;
 }
 body{
  background-color:aliceblue;
 }
  </style>
</head>
<body>
<div id="ziad">
  <h1>My To-Do List</h1>
  <input type="text" id="Modinput" placeholder="Enter a task">
  <button type="button" id="zack">Add Task</button>
  <p id="messag"></p>
  <p> Total tasks: <span id="haha">0</span></p>
  <ul id="taskList"></ul>
 </div>
 <script>
  let Modinput = document.getElementById("Modinput");
  let zack = document.getElementById("zack");
  let messag = document.getElementById("messag");
  let haha = document.getElementById("haha");
  let taskList = document.getElementById("taskList");

let count = 0;

  zack.addEventListener("click", function() {
    let taskText = Modinput.value;
    if(taskText === ""){
          messag.textContent = "Please Enter New Task";
          return;
    }
    let li = document.createElement("li");
    let taskspan = document.createElement("span");
    taskspan.textContent = taskText;

  let noteinput = document.createElement("input");
  noteinput.type = "text";
  noteinput.placeholder = "Add note";

    let Delete = document.createElement("button");
    Delete.textContent = "Delete";

    li.appendChild(taskspan);
    li.appendChild(noteinput);
    li.appendChild(Delete);
    taskList.appendChild(li);

    messag.textContent = "The task has been added.";
    count = count + 1;
    haha.textContent = count;
    Modinput.value = "";

    Delete.addEventListener("click" , function(){
    li.remove();
    count = count - 1;
    haha.textContent = count;
    messag.textContent = "Task Deleted";
    });
  });
 </script>
 </body>
</html>
