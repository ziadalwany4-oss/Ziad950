      <style>
      h1{
        color:blue;
          text-align:center;
            font-size: 50px;
            }
            input{  
              width: 90%;
                border-radius: 5px;
                  border-color: black;
                    margin-bottom: 10px;
                      margin-left:20px;
                        font-weight: bold;
                          color:black;
                            
                            }
                             button{
                               color:white;
                                 background-color:blue;
                                   border-radius: 10px;
                                     padding:12px 15px;
                                       margin-left: 20px;
                                        }
                                         button:hover{
                                             background-color:darkblue;
                                                 border-color: black;
                                                  }
                                                   input:focus{
                                                     background-color:lightblue;
                                                      }
                                                       p{
                                                         margin-left: 20px;
                                                           font-weight: bold;
                                                            }
                                                             #messag{
                                                               color:blue;
                                                                }
                                                                 body{
                                                                   background-color:aliceblue;
                                                                    }
                                                                      </style>
                                                                      </head>
                                                                      <body>
                                                                      <div id="ziad">
                                                                        <h1>My To-Do List</h1>
                                                                          <input type="text" id="Modinput" placeholder="Enter a task">
                                                                            <button type="button" id="zack">Add Task</button>
                                                                              <p id="messag"></p>
                                                                                <p> Total tasks: <span id="haha">0</span></p>
                                                                                  <ul id="taskList"></ul>
                                                                                   </div>
                                                                                    <script>
                                                                                      let Modinput = document.getElementById("Modinput");
                                                                                        let zack = document.getElementById("zack");
                                                                                          let messag = document.getElementById("messag");
                                                                                            let haha = document.getElementById("haha");
                                                                                              let taskList = document.getElementById("taskList");

                                                                                                let count = 0;

                                                                                                  // 1. دالة مخصصة لحفظ القائمة الحالية داخل جهاز المستخدم
                                                                                                    function saveTasksToLocalStorage() {
                                                                                                        let tasks = [];
                                                                                                            let items = taskList.querySelectorAll("li");
                                                                                                                
                                                                                                                    items.forEach(function(li) {
                                                                                                                          let text = li.querySelector("span").textContent;
                                                                                                                                let note = li.querySelector("input[type='text']").value;
                                                                                                                                      tasks.push({ text: text, note: note });
                                                                                                                                          });
                                                                                                                                              
                                                                                                                                                  localStorage.setItem("myToDoList", JSON.stringify(tasks));
                                                                                                                                                    }

                                                                                                                                                      // 2. دالة لإنشاء عناصر المهمة وعرضها في الصفحة
                                                                                                                                                        function createTaskElement(taskText, noteText = "") {
                                                                                                                                                            let li = document.createElement("li");
                                                                                                                                                                let taskspan = document.createElement("span");
                                                                                                                                                                    taskspan.textContent = taskText;

                                                                                                                                                                        let noteinput = document.createElement("input");
                                                                                                                                                                            noteinput.type = "text";
                                                                                                                                                                                noteinput.placeholder = "Add note";
                                                                                                                                                                                    noteinput.value = noteText; // وضع الملاحظة المحفوظة إن وجدت

                                                                                                                                                                                        let Delete = document.createElement("button");
                                                                                                                                                                                            Delete.textContent = "Delete";

                                                                                                                                                                                                li.appendChild(taskspan);
                                                                                                                                                                                                    li.appendChild(noteinput);
                                                                                                                                                                                                        li.appendChild(Delete);
                                                                                                                                                                                                            taskList.appendChild(li);

                                                                                                                                                                                                                count = count + 1;
                                                                                                                                                                                                                    haha.textContent = count;

                                                                                                                                                                                                                        // حفظ البيانات لو المستخدم عدل أو كتب جوه خانة الملاحظات
                                                                                                                                                                                                                            noteinput.addEventListener("input", saveTasksToLocalStorage);

                                                                                                                                                                                                                                // حذف المهمة
                                                                                                                                                                                                                                    Delete.addEventListener("click" , function(){
                                                                                                                                                                                                                                          li.remove();
                                                                                                                                                                                                                                                count = count - 1;
                                                                                                                                                                                                                                                      haha.textContent = count;
                                                                                                                                                                                                                                                            messag.textContent = "Task Deleted";
                                                                                                                                                                                                                                                                  saveTasksToLocalStorage(); // تحديث الحفظ بعد الحذف
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                          // 3. عند الضغط على زر إضافة مهمة جديدة
                                                                                                                                                                                                                                                                            zack.addEventListener("click", function() {
                                                                                                                                                                                                                                                                                let taskText = Modinput.value;
                                                                                                                                                                                                                                                                                    if(taskText === ""){
                                                                                                                                                                                                                                                                                              messag.textContent = "Please Enter New Task";
                                                                                                                                                                                                                                                                                                        return;
                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                    createTaskElement(taskText, ""); // إنشاء المهمة في الواجهة
                                                                                                                                                                                                                                                                                                                        messag.textContent = "The task has been added.";
                                                                                                                                                                                                                                                                                                                            Modinput.value = "";
                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                    saveTasksToLocalStorage(); // حفظ المهمة الجديدة في الجهاز
                                                                                                                                                                                                                                                                                                                                      });

                                                                                                                                                                                                                                                                                                                                        // 4. أول ما المستخدم يفتح الموقع: تحميل البيانات المحفوظة تلقائياً
                                                                                                                                                                                                                                                                                                                                          window.addEventListener("load", function() {
                                                                                                                                                                                                                                                                                                                                              let savedTasks = localStorage.getItem("myToDoList");
                                                                                                                                                                                                                                                                                                                                                  if (savedTasks) {
                                                                                                                                                                                                                                                                                                                                                        let tasksArray = JSON.parse(savedTasks);
                                                                                                                                                                                                                                                                                                                                                              tasksArray.forEach(function(task) {
                                                                                                                                                                                                                                                                                                                                                                      createTaskElement(task.text, task.note);
                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                  });
                                                                                                                                                                                                                                                                                                                                                                                   </script>
                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                    </html>
